name: Graeseo
options:
  bundleIdPrefix: com.graeseo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  Domain:
    path: Packages/Domain

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Graeseo:
    type: application
    platform: iOS
    sources:
      - Graeseo
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.graeseo.app
        INFOPLIST_FILE: Graeseo/App/Info.plist
    dependencies:
      - package: Domain
    scheme:
      testTargets:
        - GraeseoTests

  GraeseoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GraeseoTests
    dependencies:
      - target: Graeseo
